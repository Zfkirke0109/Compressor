name: Build PR Debug APK

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'fastlane/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true

# We need permission to write comments on the PR
permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine PR Number
        id: pr_context
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "PR_NUMBER=${{ github.event.number }}" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=${{ inputs.pr_number }}" >> $GITHUB_ENV
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore stable debug signing key
        shell: bash
        env:
          COMPRESSOR_DEBUG_KEYSTORE_BASE64: ${{ secrets.COMPRESSOR_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$COMPRESSOR_DEBUG_KEYSTORE_BASE64" ]; then
            echo "$COMPRESSOR_DEBUG_KEYSTORE_BASE64" | base64 --decode > ci-debug.keystore
            chmod 600 ci-debug.keystore
            echo "STABLE_DEBUG_SIGNING=true" >> "$GITHUB_ENV"
            echo "Stable debug signing key restored."
          else
            echo "STABLE_DEBUG_SIGNING=false" >> "$GITHUB_ENV"
            echo "No stable debug signing key secret found. Falling back to default debug signing."
          fi

      # 1. FIND OR CREATE THE INITIAL COMMENT
      - name: Post "Building" Comment
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
        with:
          script: |
            const marker = '<!-- bot-pr-build-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = parseInt(process.env.PR_NUMBER);
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number
            });
            const botComment = comments.data.find(c => c.body.includes(marker));
            
            const body = `${marker}
            ### 🔨 Building Debug APK...
            
            <details>
            <summary>View Status</summary>
            Building on GitHub Actions...
            </details>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: botComment.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }

      # 2. RUN THE BUILD (And capture logs)
      # We pipe output to a file (build.log) AND to console (tee) so we can read it later
      - name: Build Debug APK
        id: build_apk
        shell: bash
        env:
          COMPRESSOR_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.COMPRESSOR_DEBUG_KEYSTORE_PASSWORD }}
          COMPRESSOR_DEBUG_KEY_ALIAS: ${{ secrets.COMPRESSOR_DEBUG_KEY_ALIAS }}
          COMPRESSOR_DEBUG_KEY_PASSWORD: ${{ secrets.COMPRESSOR_DEBUG_KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace | tee build.log

      # 3. UPLOAD THE APK ARTIFACT
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: compressor-debug-pr-${{ env.PR_NUMBER }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5

      # 4. READ LOGS (Truncate to last 100 lines to fit in comment)
      - name: Process Logs
        if: always() # Run even if build failed
        id: process_logs
        run: |
          # Get the last 150 lines of the log to avoid comment size limits
          if [ -f build.log ]; then
            tail -n 150 build.log > trimmed_log.txt
          else
            echo "Build log not found. The build step may not have produced output." > trimmed_log.txt
          fi
          # Read file into variable
          echo "LOG_CONTENT<<EOF" >> $GITHUB_OUTPUT
          cat trimmed_log.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 5. UPDATE COMMENT WITH RESULT (Success or Failure)
      - name: Update Comment with Result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          LOGS: ${{ steps.process_logs.outputs.LOG_CONTENT }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS: ${{ job.status }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
          STABLE_DEBUG_SIGNING: ${{ env.STABLE_DEBUG_SIGNING }}
        with:
          script: |
            const marker = '<!-- bot-pr-build-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = parseInt(process.env.PR_NUMBER);
            const logs = process.env.LOGS;
            const runUrl = process.env.RUN_URL;
            const status = process.env.STATUS;
            
            // Find existing comment again
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number
            });
            const botComment = comments.data.find(c => c.body.includes(marker));
            
            let title = status === 'success' ? '## ✅ Build Successful' : '## ❌ Build Failed';
            let downloadSection = status === 'success' 
              ? `**Debug APK Ready**
                 
                [Download from Artifacts](${runUrl})
                 
                **Signing:** ${process.env.STABLE_DEBUG_SIGNING === 'true' ? 'Stable debug signing enabled. Future PR APKs should install as updates.' : 'Fallback debug signing. Configure stable signing secrets to avoid uninstall/reinstall.'}`
              : `**The build encountered errors.** See the logs below for details.`;

            const body = `${marker}
            ${title}
            
            ${downloadSection}
            
            <details>
            <summary>Build Logs</summary>
            
            \`\`\`text
            ${logs}
            \`\`\`
            </details>
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: botComment.id, body
              });
            }

name: Build MT English Overlay APK

on:
  workflow_dispatch:
  push:
    branches:
      - mt-localizer-build
    paths:
      - 'tools/mt-localizer/**'
      - '.github/workflows/mt-localizer-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tools/mt-localizer/**'
      - '.github/workflows/mt-localizer-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        id: build
        continue-on-error: true
        working-directory: tools/mt-localizer
        run: |
          set -o pipefail
          gradle :app:assembleDebug --no-daemon --console=plain 2>&1 | tee build-output.log

      - name: Write concise build errors
        if: always()
        working-directory: tools/mt-localizer
        run: |
          if [ -f build-output.log ]; then
            grep -E -B 3 -A 8 'error:|FAILURE:|What went wrong|Could not|cannot find symbol|Execution failed' build-output.log > build-errors.txt || true
            tail -n 250 build-output.log >> build-errors.txt
          else
            echo 'Build log was not created.' > build-errors.txt
          fi

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mt-english-overlay-build-diagnostics
          path: |
            tools/mt-localizer/build-errors.txt
            tools/mt-localizer/build-output.log
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: mt-english-overlay-apk
          path: tools/mt-localizer/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

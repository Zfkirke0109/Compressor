name: Build MT English Overlay APK

on:
  workflow_dispatch:
  push:
    branches:
      - mt-localizer-build
    paths:
      - 'tools/mt-localizer/**'
      - '.github/workflows/mt-localizer-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: tools/mt-localizer
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mt-english-overlay-apk
          path: tools/mt-localizer/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
